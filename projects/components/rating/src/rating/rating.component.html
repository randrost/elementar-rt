@for (star of _stars(); track star) {
  <button
    type="button"
    class="star-btn"
    [attr.data-fill]="_getStarFill(star)"
    [attr.data-size]="size()"
    [disabled]="disabled()"
    (mousemove)="_onMouseMove(star, $event)"
    (mouseleave)="_onMouseLeave()"
    (click)="_onSelect(star, $event)"
    [attr.aria-label]="'Rate ' + star + ' of ' + max()"
  >
    <svg class="star-full" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
    <svg class="star-half" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77V2z"/>
    </svg>
    <svg class="star-empty" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
      <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
    </svg>
  </button>
}
