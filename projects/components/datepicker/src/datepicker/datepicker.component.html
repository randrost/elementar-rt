<button class="dp-trigger" type="button" (click)="_toggle()" [disabled]="disabled()">
  <svg class="dp-icon" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
    <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
  </svg>
  <span class="dp-value" [class.is-placeholder]="!_value()">{{ _displayValue }}</span>
</button>
@if (_open()) {
  <div class="dp-calendar">
    <div class="dp-header">
      <button class="dp-nav" type="button" (click)="_prevMonth()">&#8249;</button>
      <span class="dp-month">{{ _monthLabel }}</span>
      <button class="dp-nav" type="button" (click)="_nextMonth()">&#8250;</button>
    </div>
    <div class="dp-weekdays">
      @for (d of ['Su','Mo','Tu','We','Th','Fr','Sa']; track d) {
        <span>{{ d }}</span>
      }
    </div>
    <div class="dp-grid">
      @for (day of _calendarDays; track $index) {
        <button
          class="dp-day"
          type="button"
          [class.is-today]="_isToday(day)"
          [class.is-selected]="_isSelected(day)"
          [class.is-empty]="!day"
          [disabled]="!day"
          (click)="day && _selectDay(day)"
        >{{ day?.getDate() ?? '' }}</button>
      }
    </div>
  </div>
}
