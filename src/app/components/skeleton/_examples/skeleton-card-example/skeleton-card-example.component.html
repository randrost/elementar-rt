      <emr-skeleton>
        <emr-skeleton-block class="h-40 rounded-lg mb-3" />
        <emr-skeleton-line class="h-5 w-3/4" />
        <emr-skeleton-line class="h-4 w-full" />
        <emr-skeleton-line class="h-4 w-5/6" />
        <emr-skeleton-line class="h-4 w-2/3" />
      </emr-skeleton>
    </div>
  }
</div>
