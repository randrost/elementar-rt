<div class="flex flex-col gap-0 p-6">
  @for (i of [1,2,3,4,5]; track i) {
    <div class="flex items-center gap-3 py-3 border-b border-outline-variant/50">
      <emr-skeleton>
        <emr-skeleton-circle class="w-10 h-10 shrink-0" />
      </emr-skeleton>
      <div class="flex-1 flex flex-col gap-1">
        <emr-skeleton>
          <emr-skeleton-line class="h-4 w-1/3" />
          <emr-skeleton-line class="h-3 w-2/3" />
        </emr-skeleton>
      </div>
      <emr-skeleton>
        <emr-skeleton-line class="h-6 w-16 rounded-full" />
      </emr-skeleton>
    </div>
  }
</div>
