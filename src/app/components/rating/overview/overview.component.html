<app-page>
  <h1 appPageTitle>Rating</h1>
  <div appPageContent>
    <main class="mb-10">
      <p>Star rating component with half-star support, keyboard navigation, and form integration via ControlValueAccessor.</p>
    </main>

    <h3 class="mat-title-large">Basic</h3>
    <emr-playground exampleUrl="_docs/components/rating/_examples" exampleName="basic-rating-example">
      <app-basic-rating-example />
    </emr-playground>

    <mat-divider class="my-8" />

    <h3 class="mat-title-large">Sizes</h3>
    <emr-playground exampleUrl="_docs/components/rating/_examples" exampleName="rating-sizes-example">
      <app-rating-sizes-example />
    </emr-playground>

    <mat-divider class="my-8" />

    <h3 class="mat-title-large">Readonly</h3>
    <emr-playground exampleUrl="_docs/components/rating/_examples" exampleName="rating-readonly-example">
      <app-rating-readonly-example />
    </emr-playground>
  </div>
</app-page>
