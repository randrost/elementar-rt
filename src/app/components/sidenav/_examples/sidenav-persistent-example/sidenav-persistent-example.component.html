<div class="p-6">
  <emr-sidenav-container mode="side" style="height: 300px; border: 1px solid var(--color-outline-variant); border-radius: 12px; overflow: hidden;">
    <emr-sidenav>
      <div class="p-4 flex flex-col gap-1">
        <p class="text-xs font-semibold text-surface-variant uppercase px-2 mb-1">Menu</p>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Dashboard</button>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Analytics</button>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Settings</button>
      </div>
    </emr-sidenav>
    <div class="flex-1 overflow-auto">
      <div class="flex items-center gap-2 p-3 border-b border-outline-variant">
        <button mat-icon-button (click)="toggle()"><mat-icon>menu</mat-icon></button>
        <span class="font-medium">App Title</span>
      </div>
      <div class="p-4">
        <p class="text-sm text-surface-variant">Main content area. Toggle the sidebar with the menu button.</p>
      </div>
    </div>
  </emr-sidenav-container>
</div>
