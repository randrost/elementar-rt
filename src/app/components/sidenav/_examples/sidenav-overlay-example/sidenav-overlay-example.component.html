<div class="p-6">
  <emr-sidenav-container mode="overlay" [opened]="false" style="height: 300px; border: 1px solid var(--color-outline-variant); border-radius: 12px; overflow: hidden;">
    <emr-sidenav>
      <div class="p-4 flex flex-col gap-1">
        <p class="text-xs font-semibold text-surface-variant uppercase px-2 mb-2">Navigation</p>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Home</button>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Profile</button>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Messages</button>
        <button class="flex items-center gap-2 px-3 py-2 rounded-lg hover:bg-surface-container text-sm text-left">Settings</button>
      </div>
    </emr-sidenav>
    <div class="flex-1 flex flex-col">
      <div class="flex items-center gap-2 p-3 border-b border-outline-variant">
        <button mat-icon-button (click)="open()"><mat-icon>menu</mat-icon></button>
        <span class="font-medium">Overlay Mode</span>
      </div>
      <div class="p-4 flex-1 flex items-center justify-center">
        <p class="text-sm text-surface-variant">Click the menu button to open overlay sidenav.</p>
      </div>
    </div>
  </emr-sidenav-container>
</div>
