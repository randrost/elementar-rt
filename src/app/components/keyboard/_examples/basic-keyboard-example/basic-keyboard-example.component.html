<div class="flex flex-wrap gap-6 p-6">
  <div class="flex flex-col gap-2">
    <p class="text-sm text-surface-variant">Save</p>
    <emr-keyboard [keys]="['ctrl', 's']" />
  </div>
  <div class="flex flex-col gap-2">
    <p class="text-sm text-surface-variant">Copy</p>
    <emr-keyboard [keys]="['ctrl', 'c']" />
  </div>
  <div class="flex flex-col gap-2">
    <p class="text-sm text-surface-variant">Find</p>
    <emr-keyboard [keys]="['ctrl', 'f']" />
  </div>
  <div class="flex flex-col gap-2">
    <p class="text-sm text-surface-variant">Undo</p>
    <emr-keyboard [keys]="['ctrl', 'z']" />
  </div>
</div>
