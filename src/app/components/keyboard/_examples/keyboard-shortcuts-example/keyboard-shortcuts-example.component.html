<div class="p-6">
  <div class="flex flex-col divide-y divide-outline-variant">
    @for (shortcut of shortcuts; track shortcut.keys) {
      <div class="flex items-center justify-between py-3">
        <span class="text-sm">{{ shortcut.label }}</span>
        <emr-keyboard [keys]="shortcut.keys" />
      </div>
    }
  </div>
</div>
