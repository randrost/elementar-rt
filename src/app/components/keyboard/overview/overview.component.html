    </main>

    <h3 class="mat-title-large">Basic</h3>
    <emr-playground exampleUrl="_docs/components/keyboard/_examples" exampleName="basic-keyboard-example">
      <app-basic-keyboard-example />

    <mat-divider class="my-8" />

    <h3 class="mat-title-large">Shortcuts list</h3>
    <emr-playground exampleUrl="_docs/components/keyboard/_examples" exampleName="keyboard-shortcuts-example">
      <app-keyboard-shortcuts-example />
    </emr-playground>
  </div>
</app-page>
