<div class="p-6 overflow-auto">
  <table class="w-full text-sm" emrSort (sortChange)="onSort($event)">
    <thead>
      <tr class="border-b border-outline-variant text-left">
        <th class="py-3 pr-6 font-medium cursor-pointer select-none" emrSortHeader="name">Name</th>
        <th class="py-3 pr-6 font-medium cursor-pointer select-none" emrSortHeader="role">Role</th>
        <th class="py-3 font-medium cursor-pointer select-none" emrSortHeader="joined">Joined</th>
      </tr>
    </thead>
    <tbody>
      @for (row of rows(); track row.name) {
        <tr class="border-b border-outline-variant/50 hover:bg-surface-container-low transition-colors">
          <td class="py-3 pr-6">{{ row.name }}</td>
          <td class="py-3 pr-6">{{ row.role }}</td>
          <td class="py-3">{{ row.joined }}</td>
        </tr>
      }
    </tbody>
  </table>
</div>
