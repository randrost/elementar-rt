<div class="p-6 flex flex-col gap-4 max-w-2xl">
  <div class="flex items-center justify-between">
    <h3 class="font-semibold">Edit post</h3>
    <div class="flex items-center gap-3">
      @if (saved()) {
        <span class="text-sm text-green-600">✓ Saved</span>
      }
      <button mat-flat-button (click)="save()">Save Draft</button>
    </div>
  </div>
  <emr-content-editor [(ngModel)]="content" placeholder="Write your post content here..." />
</div>
