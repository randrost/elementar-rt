<div class="flex flex-wrap gap-4 p-6 items-center">
  <emr-badge [value]="3" [standalone]="true">Default</emr-badge>
  <emr-badge [value]="12" [standalone]="true" variant="primary">Primary</emr-badge>
  <emr-badge [value]="99" [standalone]="true" variant="success">Success</emr-badge>
  <emr-badge [value]="100" [standalone]="true" variant="warning">Warning (max)</emr-badge>
  <emr-badge [value]="7" [standalone]="true" variant="danger">Danger</emr-badge>
  <emr-badge [dot]="true" [standalone]="true" variant="success">Online</emr-badge>
  <emr-badge [dot]="true" [standalone]="true" variant="danger">Busy</emr-badge>
</div>
