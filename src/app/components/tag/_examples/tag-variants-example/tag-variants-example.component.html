<div class="flex flex-wrap gap-4 p-6">
  <div class="flex flex-col gap-2 items-start">
    <p class="text-sm font-medium">Small</p>
    <div class="flex gap-2">
      <emr-tag size="sm" color="primary">Design</emr-tag>
      <emr-tag size="sm" color="success">Published</emr-tag>
      <emr-tag size="sm" color="warning">Draft</emr-tag>
    </div>
  </div>
  <div class="flex flex-col gap-2 items-start">
    <p class="text-sm font-medium">Medium</p>
    <div class="flex gap-2">
      <emr-tag size="md" color="primary">Design</emr-tag>
      <emr-tag size="md" color="success">Published</emr-tag>
      <emr-tag size="md" color="warning">Draft</emr-tag>
    </div>
  </div>
  <div class="flex flex-col gap-2 items-start">
    <p class="text-sm font-medium">Large</p>
    <div class="flex gap-2">
      <emr-tag size="lg" color="primary">Design</emr-tag>
      <emr-tag size="lg" color="success">Published</emr-tag>
      <emr-tag size="lg" color="warning">Draft</emr-tag>
    </div>
  </div>
  <div class="flex flex-col gap-2 items-start">
    <p class="text-sm font-medium">With dot</p>
    <div class="flex gap-2">
      <emr-tag [dot]="true" color="success">Active</emr-tag>
      <emr-tag [dot]="true" color="error">Offline</emr-tag>
      <emr-tag [dot]="true" color="warning">Idle</emr-tag>
    </div>
  </div>
</div>
