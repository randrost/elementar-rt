<div class="flex flex-col gap-4 items-start">
  <div class="flex items-center gap-3 text-sm">
    <span class="text-neutral-500">Min: {{ minWidth }}px</span>
    <span class="font-semibold">Current: {{ currentWidth() }}px</span>
    <span class="text-neutral-500">Max: {{ maxWidth }}px</span>
  </div>

  <div class="w-[600px] min-h-[400px] flex items-center justify-center">
    <emr-image-resizer
      [imageMaxWidth]="maxWidth"
      [imageMinWidth]="minWidth"
      (imageResized)="onImageResized($event)"
    >
      <img src="assets/image/image.jpg" alt="" emrImageResizerImage width="400">
    </emr-image-resizer>
  </div>
</div>
