    <emr-playground exampleUrl="_docs/components/step-tracker/_examples" exampleName="step-tracker-vertical-example">
      <app-step-tracker-vertical-example />

    <mat-divider class="my-8" />

    <h3 class="mat-title-large">Interactive</h3>
    <emr-playground exampleUrl="_docs/components/step-tracker/_examples" exampleName="step-tracker-interactive-example">
