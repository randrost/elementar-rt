<div class="p-6">
  <emr-split-pane [initialSize]="40" [minSize]="20" [maxSize]="80" style="height: 300px; display: block;">
    <div class="h-full p-4 bg-surface-container rounded-l-xl">
      <h4 class="font-semibold mb-2">Left Panel</h4>
      <p class="text-sm text-surface-variant">Drag the divider to resize the panels.</p>
    </div>
    <div class="h-full p-4 bg-surface-container-low rounded-r-xl">
      <h4 class="font-semibold mb-2">Right Panel</h4>
      <p class="text-sm text-surface-variant">Min 20%, max 80% of the container width.</p>
    </div>
  </emr-split-pane>
</div>
