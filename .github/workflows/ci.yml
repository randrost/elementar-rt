name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Lint
        run: npm run lint --if-present

      # Runs the component library and demo app unit suites headless. A failing
      # spec now fails the build — the suites are green and must stay that way.
      - name: Test
        run: npm run test:ci

      - name: Build library
        run: npm run build:components:prod

      - name: Build demo app
        run: npm run build:prod
